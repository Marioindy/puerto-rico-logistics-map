version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - pnpm install
            - echo "CONVEX_DEPLOYMENT=$CONVEX_DEPLOYMENT" >> .env.production
            - echo "CONVEX_URL=$CONVEX_URL" >> .env.production
            - echo "PPLX=$PPLX" >> .env.production
            - CONVEX_DEPLOY_KEY=$CONVEX_DEPLOY_KEY npx convex deploy --cmd-url-env-var-name CONVEX_URL
        build:
          commands:
            - pnpm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ~/.pnpm-store
          - node_modules/**/*