version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - corepack enable || npm install -g pnpm
            - export NODE_OPTIONS='--max-old-space-size=14000'
            - pnpm install
            - echo "CONVEX_DEPLOYMENT=$CONVEX_DEPLOYMENT" >> .env.production
            - echo "CONVEX_URL=$CONVEX_URL" >> .env.production
            - echo "PPLX=$PPLX" >> .env.production
        build:
          commands:
            - pnpm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
        - node_modules/**/*
