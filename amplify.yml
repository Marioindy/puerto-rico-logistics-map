version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - corepack enable || npm install -g pnpm
            - pnpm install
            - echo "CONVEX_DEPLOYMENT=$CONVEX_DEPLOYMENT" >> .env.production
            - echo "CONVEX_URL=$CONVEX_URL" >> .env.production
            - echo "PPLX=$PPLX" >> .env.production
            - echo "Deploy key prefix:" $(echo $CONVEX_DEPLOY_KEY | cut -c1-10)
            #- CONVEX_DEPLOY_KEY="$CONVEX_DEPLOY_KEY" npx convex deploy
        build:
          commands:
            - pnpm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ~/.pnpm-store/**/*
          - node_modules/**/*